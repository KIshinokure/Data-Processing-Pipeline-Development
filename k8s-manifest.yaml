apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-collector
  template:
    metadata:
      labels:
        app: go-collector
    spec:
      containers:
      - name: go-collector
        image: industrial_monitoring-go-collector:latest
        ports:
        - containerPort: 8081
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-collector-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-collector
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

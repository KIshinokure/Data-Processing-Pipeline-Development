version: '3.8'

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    ports:
      - "2379:2379"

  go-collector:
    build: ./go_collector
    ports:
      - "8081:8081"
    depends_on:
      - etcd

  python-analyzer:
    build: ./python_analyzer
    command: streamlit run analyzer.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - go-collector
